spring:
  application:
    name: JsonView

  datasource:
    url: jdbc:postgresql://localhost:5435/book_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    ru.itk.jsonview: DEBUG
    org.springframework.web: INFO
    org.hibernate: ERROR